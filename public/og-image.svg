<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow1" cx="85%" cy="0%" r="55%">
      <stop offset="0%" stop-color="#D4A017" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#D4A017" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#D4A017" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#D4A017" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="#0A0B0D"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Eyebrow -->
  <g transform="translate(80, 220)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#D4A017" stroke-width="2"/>
    <text x="52" y="5" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif" font-size="18" font-weight="600" letter-spacing="3.5" fill="#D4A017">SEGURIDAD INTEGRAL · DESDE 2008</text>
  </g>

  <!-- Tagline -->
  <text x="80" y="320" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif" font-size="68" font-weight="800" letter-spacing="-2" fill="#E8E9EB">La seguridad de tu empresa,</text>
  <text x="80" y="400" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif" font-size="68" font-weight="800" letter-spacing="-2" fill="#D4A017">en manos expertas.</text>

  <!-- Logo (bottom-left) -->
  <g transform="translate(80, 530)">
    <text x="0" y="0" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif" font-size="40" font-weight="800" letter-spacing="-1.2" fill="#E8E9EB">WATCH<tspan fill="#D4A017">MAN</tspan></text>
    <text x="0" y="30" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif" font-size="14" font-weight="500" fill="#9BA1A6">Seguridad Integral</text>
  </g>

  <!-- URL (bottom-right) -->
  <text x="1120" y="560" text-anchor="end" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif" font-size="16" font-weight="500" letter-spacing="2" fill="#6B7177">WATCHMAN.CL</text>
</svg>
